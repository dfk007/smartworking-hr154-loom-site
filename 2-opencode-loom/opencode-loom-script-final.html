<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode Loom Master Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #060816;
      --bg-soft: #0d1226;
      --panel: rgba(11, 18, 38, 0.72);
      --panel-strong: rgba(15, 23, 46, 0.92);
      --panel-border: rgba(166, 180, 255, 0.18);
      --text: #f5f7ff;
      --muted: #b6c0e5;
      --muted-strong: #dbe3ff;
      --accent: #8ea2ff;
      --accent-2: #7be7c7;
      --accent-3: #f4c56c;
      --shadow: 0 28px 120px rgba(0, 0, 0, 0.38);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --max: 1240px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(142, 162, 255, 0.26), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(123, 231, 199, 0.2), transparent 24%),
        radial-gradient(circle at 62% 82%, rgba(244, 197, 108, 0.16), transparent 20%),
        linear-gradient(180deg, #040611 0%, #090e1f 40%, #060816 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.65), transparent 86%);
      opacity: 0.3;
    }

    body::after {
      background: linear-gradient(180deg, rgba(6, 8, 22, 0) 0%, rgba(6, 8, 22, 0.88) 88%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    :focus-visible {
      outline: 2px solid var(--accent-3);
      outline-offset: 3px;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 20px 0 64px;
    }

    .topbar {
      position: sticky;
      top: 16px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      margin-bottom: 28px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(8, 12, 26, 0.72);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 48px rgba(0, 0, 0, 0.25);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.46), transparent 34%),
        linear-gradient(135deg, rgba(142, 162, 255, 0.95), rgba(123, 231, 199, 0.82));
      box-shadow: 0 12px 32px rgba(123, 231, 199, 0.18);
    }

    .brand-copy strong,
    .brand-copy span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-copy strong {
      font-size: 0.95rem;
      letter-spacing: 0.03em;
    }

    .brand-copy span {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .topbar-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .ghost-link,
    .primary-link,
    .tab-button {
      border-radius: 999px;
      border: 1px solid transparent;
      transition: transform 220ms ease, border-color 220ms ease, background 220ms ease, color 220ms ease, box-shadow 220ms ease;
    }

    .ghost-link,
    .primary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 18px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .ghost-link {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted-strong);
    }

    .ghost-link:hover,
    .ghost-link:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }

    .primary-link {
      background: linear-gradient(135deg, rgba(142, 162, 255, 0.98), rgba(123, 231, 199, 0.92));
      color: #07101f;
      box-shadow: 0 18px 40px rgba(142, 162, 255, 0.28);
    }

    .primary-link:hover,
    .primary-link:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 22px 48px rgba(142, 162, 255, 0.38);
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.88fr);
      gap: 22px;
      padding: 34px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02)),
        rgba(11, 18, 38, 0.68);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 440px;
      height: 440px;
      border-radius: 50%;
      top: -140px;
      right: -80px;
      background: radial-gradient(circle, rgba(142, 162, 255, 0.34), transparent 66%);
      filter: blur(12px);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted-strong);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-3), var(--accent-2));
      box-shadow: 0 0 18px rgba(244, 197, 108, 0.65);
    }

    .hero-copy {
      position: relative;
      z-index: 1;
    }

    .hero-copy h1 {
      max-width: 11ch;
      margin: 18px 0 16px;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(3rem, 7vw, 5.6rem);
      line-height: 0.94;
      letter-spacing: -0.04em;
    }

    .hero-copy p {
      max-width: 60ch;
      margin: 0 0 22px;
      color: var(--muted-strong);
      font-size: 1.02rem;
      line-height: 1.75;
    }

    .chip-row,
    .pill-row,
    .asset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip,
    .pill,
    .asset-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted-strong);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .chip strong,
    .pill strong {
      color: var(--text);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 24px 0 26px;
    }

    .hero-side {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .glass-card,
    .signal-card,
    .story-card,
    .chapter-panel,
    .overview-card,
    .footer-card {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-lg);
      background: rgba(10, 15, 31, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .glass-card {
      padding: 22px;
    }

    .signal-card {
      padding: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        rgba(10, 15, 31, 0.8);
    }

    .signal-card h2,
    .signal-card h3,
    .overview-card h3,
    .story-card h3,
    .panel-card h3,
    .footer-card h3 {
      margin: 0 0 10px;
      font-size: 1.08rem;
      line-height: 1.3;
    }

    .signal-card p,
    .overview-card p,
    .story-card p,
    .panel-card p,
    .footer-card p,
    .chapter-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .signal-card strong,
    .overview-stat strong {
      display: block;
      margin-bottom: 6px;
      font-size: 2rem;
      line-height: 1;
      color: var(--text);
    }

    .signal-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .signal-list div {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .section-grid,
    .overview-grid,
    .story-grid,
    .footer-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 18px;
      margin-top: 22px;
    }

    .overview-card,
    .story-card,
    .footer-card {
      grid-column: span 4;
      padding: 22px;
    }

    .overview-card.wide,
    .footer-card.wide {
      grid-column: span 6;
    }

    .overview-card.full,
    .footer-card.full {
      grid-column: span 12;
    }

    .overview-stat {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .overview-stat span {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(142, 162, 255, 0.14);
      color: var(--muted-strong);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-title {
      margin-top: 28px;
      padding-top: 10px;
    }

    .section-title h2,
    .chapter-head h2 {
      margin: 10px 0 10px;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .section-title p {
      max-width: 64ch;
      color: var(--muted-strong);
      line-height: 1.75;
    }

    .story-card {
      position: relative;
      overflow: hidden;
      min-height: 240px;
    }

    .story-card::before {
      content: "";
      position: absolute;
      inset: auto -40px -52px auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(142, 162, 255, 0.22), transparent 68%);
      pointer-events: none;
    }

    .story-step {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted-strong);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .chapter-shell {
      margin-top: 30px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-xl);
      background: rgba(8, 12, 26, 0.55);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .chapter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 22px;
    }

    .tab-button {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      min-height: 76px;
      padding: 16px 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted-strong);
      text-align: left;
      min-width: 170px;
    }

    .tab-button small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.4;
    }

    .tab-button.is-active {
      border-color: rgba(142, 162, 255, 0.32);
      background: linear-gradient(135deg, rgba(142, 162, 255, 0.18), rgba(123, 231, 199, 0.12));
      color: var(--text);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }

    .tab-button:hover,
    .tab-button:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .chapter-panel {
      overflow: hidden;
      padding: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(10, 15, 31, 0.82);
    }

    .chapter-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .chapter-head p {
      max-width: 58ch;
    }

    .chapter-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(244, 197, 108, 0.14);
      color: var(--muted-strong);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .panel-body {
      margin-top: 22px;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 18px;
    }

    .panel-card {
      grid-column: span 12;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
    }

    .panel-card.span-8 {
      grid-column: span 8;
    }

    .panel-card.span-6 {
      grid-column: span 6;
    }

    .panel-card.span-4 {
      grid-column: span 4;
    }

    .panel-card.featured {
      background: linear-gradient(135deg, rgba(142, 162, 255, 0.12), rgba(123, 231, 199, 0.08));
    }

    .panel-card ul,
    .panel-card ol {
      margin: 14px 0 0 18px;
      padding: 0;
      color: var(--muted-strong);
      line-height: 1.7;
    }

    .panel-card li + li {
      margin-top: 8px;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
    }

    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.02);
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
      vertical-align: top;
      line-height: 1.65;
    }

    th {
      color: var(--muted-strong);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.04);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .callout {
      margin-top: 16px;
      padding: 16px 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 4px solid var(--accent);
      border-radius: 18px;
      background: rgba(142, 162, 255, 0.1);
      color: var(--muted-strong);
      line-height: 1.7;
    }

    .callout.good {
      border-left-color: var(--accent-2);
      background: rgba(123, 231, 199, 0.1);
    }

    .callout.warn {
      border-left-color: var(--accent-3);
      background: rgba(244, 197, 108, 0.1);
    }

    pre {
      margin: 16px 0 0;
      padding: 18px;
      overflow-x: auto;
      white-space: pre-wrap;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(5, 8, 18, 0.92);
      color: #f4f6ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    code {
      padding: 0.15em 0.4em;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    .asset-row {
      margin-top: 16px;
    }

    .asset-link {
      transition: transform 220ms ease, border-color 220ms ease, background 220ms ease;
    }

    .asset-link:hover,
    .asset-link:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 18px;
      margin-top: 16px;
    }

    .media-card {
      grid-column: span 6;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
    }

    .media-card.full {
      grid-column: span 12;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    audio,
    video,
    iframe {
      width: 100%;
      margin-top: 16px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #000;
    }

    iframe {
      min-height: 880px;
      background: rgba(8, 12, 26, 0.8);
    }

    .footer-grid {
      margin-top: 30px;
    }

    .footer-card ul {
      margin: 14px 0 0 18px;
      padding: 0;
      color: var(--muted-strong);
      line-height: 1.7;
    }

    .footer-note {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .overview-card,
      .story-card,
      .footer-card,
      .overview-card.wide,
      .footer-card.wide,
      .panel-card.span-8,
      .panel-card.span-6,
      .panel-card.span-4,
      .media-card,
      .media-card.full {
        grid-column: span 12;
      }

      .chapter-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 860px) {
      .app-shell {
        width: min(calc(100% - 24px), var(--max));
      }

      .topbar {
        position: static;
        border-radius: 28px;
      }

      .topbar,
      .brand,
      .topbar-actions {
        align-items: flex-start;
      }

      .topbar {
        flex-direction: column;
      }

      .topbar-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .hero,
      .chapter-shell,
      .chapter-panel {
        padding: 22px;
      }

      .hero-copy h1,
      .section-title h2,
      .chapter-head h2 {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        width: min(calc(100% - 18px), var(--max));
        padding-top: 16px;
      }

      .topbar,
      .hero,
      .glass-card,
      .signal-card,
      .overview-card,
      .story-card,
      .chapter-shell,
      .chapter-panel,
      .panel-card,
      .media-card,
      .footer-card {
        border-radius: 22px;
      }

      .hero-copy h1 {
        font-size: clamp(2.5rem, 16vw, 4rem);
      }

      .primary-link,
      .ghost-link,
      .asset-link {
        width: 100%;
      }

      .tab-button {
        width: 100%;
        min-width: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
        transition-delay: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <template id="tpl-sample">
    <div class="panel-grid">
      <article class="panel-card featured span-12">
        <h3>What the sample video gets right</h3>
        <p>It does not waste time on biography. It opens with role-fit, moves immediately into proof, then spends most of the runtime on one credible project story.</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>What the candidate says</th>
                <th>Why it works</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>0:00 - 1:27</td>
                <td>Introduces himself as a senior DevOps and cloud engineer, mirrors the job description, and states three strengths quickly.</td>
                <td>Creates immediate credibility and makes the rest of the video easier to believe.</td>
              </tr>
