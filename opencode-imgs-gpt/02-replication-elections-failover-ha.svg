<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">MongoDB Replication Elections Failover and High Availability</title>
  <desc id="desc">Educational infographic explaining primary, secondaries, oplog replication, heartbeats, election, automatic failover, and brief write interruption.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06111f"/><stop offset="1" stop-color="#0b1020"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#20304a" stroke-width="1" opacity="0.35"/></pattern>
  </defs>
  <rect width="1280" height="900" fill="url(#bg)"/>
  <rect width="1280" height="900" fill="url(#grid)" opacity="0.55"/>
  <text x="64" y="76" fill="#f3f7fb" font-family="Arial" font-size="38" font-weight="800">MongoDB Replication, Elections, Failover, and HA</text>
  <text x="64" y="114" fill="#8ca0bc" font-family="Arial" font-size="18">A replica set keeps copies of data, elects a new primary after failure, and resumes writes automatically.</text>

  <rect x="54" y="145" width="750" height="610" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="86" y="188" fill="#38bdf8" font-family="Arial" font-size="20" font-weight="700">Replica Set Flow</text>
  <circle cx="425" cy="315" r="88" fill="#12263a" stroke="#4ade80" stroke-width="5" filter="url(#glow)"/>
  <text x="382" y="305" fill="#f3f7fb" font-family="Arial" font-size="22" font-weight="800">Primary</text>
  <text x="367" y="335" fill="#bbf7d0" font-family="Arial" font-size="15">accepts writes</text>
  <circle cx="220" cy="555" r="72" fill="#101f35" stroke="#38bdf8" stroke-width="4"/>
  <circle cx="630" cy="555" r="72" fill="#101f35" stroke="#38bdf8" stroke-width="4"/>
  <text x="175" y="555" fill="#d9e3f0" font-family="Arial" font-size="19" font-weight="700">Secondary</text>
  <text x="585" y="555" fill="#d9e3f0" font-family="Arial" font-size="19" font-weight="700">Secondary</text>
  <line x1="380" y1="390" x2="270" y2="500" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="470" y1="390" x2="580" y2="500" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="238" y="448" fill="#38bdf8" font-family="Arial" font-size="15" font-weight="700">oplog replication</text>
  <text x="494" y="448" fill="#38bdf8" font-family="Arial" font-size="15" font-weight="700">oplog replication</text>
  <path d="M220 480 C260 400, 590 400, 630 480" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="374" y="432" fill="#fbbf24" font-family="Arial" font-size="16" font-weight="700">heartbeats</text>

  <rect x="840" y="145" width="386" height="610" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="872" y="188" fill="#38bdf8" font-family="Arial" font-size="20" font-weight="700">Failure and Election</text>
  <circle cx="945" cy="305" r="58" fill="#25121a" stroke="#f87171" stroke-width="4"/>
  <text x="920" y="313" fill="#fecaca" font-family="Arial" font-size="18" font-weight="800">Primary</text>
  <line x1="910" y1="270" x2="980" y2="340" stroke="#f87171" stroke-width="7"/>
  <line x1="980" y1="270" x2="910" y2="340" stroke="#f87171" stroke-width="7"/>
  <text x="1022" y="300" fill="#f87171" font-family="Arial" font-size="16" font-weight="700">fails</text>
  <circle cx="1032" cy="510" r="65" fill="#12263a" stroke="#4ade80" stroke-width="5" filter="url(#glow)"/>
  <text x="984" y="504" fill="#f3f7fb" font-family="Arial" font-size="19" font-weight="800">New Primary</text>
  <text x="992" y="530" fill="#bbf7d0" font-family="Arial" font-size="14">writes resume</text>
  <line x1="962" y1="365" x2="1010" y2="445" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="999" y="403" fill="#38bdf8" font-family="Arial" font-size="16" font-weight="700">election</text>
  <rect x="888" y="630" width="286" height="80" rx="14" fill="#08111d" stroke="#31415f"/>
  <text x="914" y="660" fill="#fbbf24" font-family="Arial" font-size="16" font-weight="700">App impact</text>
  <text x="914" y="686" fill="#d9e3f0" font-family="Arial" font-size="14">writes pause briefly, then retry logic succeeds</text>

  <rect x="74" y="790" width="1130" height="72" rx="16" fill="#071424" stroke="#31415f"/>
  <text x="96" y="822" fill="#f3f7fb" font-family="Arial" font-size="17" font-weight="700">What to inspect:</text>
  <text x="224" y="822" fill="#d9e3f0" font-family="Arial" font-size="16">db.hello(), rs.status(), stateStr, optimeDate, replication lag, isWritablePrimary, election timing.</text>
  <text x="96" y="850" fill="#f3f7fb" font-family="Arial" font-size="17" font-weight="700">Interview rule:</text>
  <text x="220" y="850" fill="#d9e3f0" font-family="Arial" font-size="16">HA is not zero interruption; it is controlled failover plus app retry behavior.</text>
</svg>
