<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">MongoDB Atlas Backups PITR Restore Testing and Disaster Recovery</title>
  <desc id="desc">Educational infographic explaining snapshots, Point-in-Time Recovery, RPO, RTO, restore to a new cluster, and restore validation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06111f"/><stop offset="1" stop-color="#0b1020"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#20304a" stroke-width="1" opacity="0.35"/></pattern>
  </defs>
  <rect width="1280" height="900" fill="url(#bg)"/>
  <rect width="1280" height="900" fill="url(#grid)" opacity="0.55"/>
  <text x="64" y="76" fill="#f3f7fb" font-family="Arial" font-size="36" font-weight="800">MongoDB Backups, PITR, Restore Testing, and DR</text>
  <text x="64" y="114" fill="#8ca0bc" font-family="Arial" font-size="18">A backup strategy is only useful when you can restore, validate, and cut over under pressure.</text>

  <rect x="54" y="150" width="1172" height="260" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="86" y="195" fill="#38bdf8" font-family="Arial" font-size="20" font-weight="700">1. Backup Timeline</text>
  <line x1="140" y1="300" x2="1120" y2="300" stroke="#31415f" stroke-width="8"/>
  <line x1="140" y1="300" x2="850" y2="300" stroke="#38bdf8" stroke-width="8"/>
  <g fill="#12263a" stroke="#4ade80" stroke-width="4">
    <circle cx="220" cy="300" r="28"/><circle cx="420" cy="300" r="28"/><circle cx="620" cy="300" r="28"/><circle cx="820" cy="300" r="28"/><circle cx="1020" cy="300" r="28"/>
  </g>
  <text x="182" y="356" fill="#d9e3f0" font-family="Arial" font-size="14">Snapshot 00:00</text>
  <text x="382" y="356" fill="#d9e3f0" font-family="Arial" font-size="14">Snapshot 06:00</text>
  <text x="582" y="356" fill="#d9e3f0" font-family="Arial" font-size="14">Snapshot 12:00</text>
  <text x="782" y="356" fill="#d9e3f0" font-family="Arial" font-size="14">Snapshot 18:00</text>
  <text x="982" y="356" fill="#d9e3f0" font-family="Arial" font-size="14">Snapshot 24:00</text>
  <path d="M700 210 L760 300 L700 390" fill="none" stroke="#fbbf24" stroke-width="5"/>
  <text x="672" y="202" fill="#fbbf24" font-family="Arial" font-size="16" font-weight="700">PITR target</text>
  <text x="680" y="228" fill="#d9e3f0" font-family="Arial" font-size="14">recover between snapshots</text>

  <rect x="54" y="450" width="552" height="300" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="86" y="495" fill="#38bdf8" font-family="Arial" font-size="20" font-weight="700">2. Restore Path</text>
  <circle cx="210" cy="610" r="68" fill="#12263a" stroke="#4ade80" stroke-width="4"/>
  <text x="170" y="606" fill="#f3f7fb" font-family="Arial" font-size="18" font-weight="700">Source</text>
  <text x="170" y="632" fill="#8ca0bc" font-family="Arial" font-size="13">current cluster</text>
  <line x1="285" y1="610" x2="414" y2="610" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="302" y="585" fill="#38bdf8" font-family="Arial" font-size="15" font-weight="700">restore</text>
  <circle cx="480" cy="610" r="68" fill="#12263a" stroke="#fbbf24" stroke-width="4"/>
  <text x="442" y="606" fill="#f3f7fb" font-family="Arial" font-size="18" font-weight="700">New</text>
  <text x="430" y="632" fill="#8ca0bc" font-family="Arial" font-size="13">restored cluster</text>
  <text x="115" y="710" fill="#fbbf24" font-family="Arial" font-size="16" font-weight="700">Atlas restores to a new cluster, not usually over the live cluster.</text>

  <rect x="650" y="450" width="576" height="300" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="682" y="495" fill="#38bdf8" font-family="Arial" font-size="20" font-weight="700">3. DR Validation Checklist</text>
  <text x="700" y="548" fill="#bbf7d0" font-family="Arial" font-size="18" font-weight="700">[ ] Restore completes</text>
  <text x="700" y="586" fill="#bbf7d0" font-family="Arial" font-size="18" font-weight="700">[ ] App can connect</text>
  <text x="700" y="624" fill="#bbf7d0" font-family="Arial" font-size="18" font-weight="700">[ ] Data integrity sampled</text>
  <text x="700" y="662" fill="#bbf7d0" font-family="Arial" font-size="18" font-weight="700">[ ] Smoke test passes</text>
  <text x="700" y="700" fill="#bbf7d0" font-family="Arial" font-size="18" font-weight="700">[ ] Cutover plan documented</text>
  <rect x="1000" y="535" width="160" height="70" rx="14" fill="#08111d" stroke="#fbbf24"/>
  <text x="1048" y="563" fill="#fbbf24" font-family="Arial" font-size="18" font-weight="800">RPO</text>
  <text x="1020" y="589" fill="#d9e3f0" font-family="Arial" font-size="13">data loss target</text>
  <rect x="1000" y="625" width="160" height="70" rx="14" fill="#08111d" stroke="#38bdf8"/>
  <text x="1048" y="653" fill="#38bdf8" font-family="Arial" font-size="18" font-weight="800">RTO</text>
  <text x="1019" y="679" fill="#d9e3f0" font-family="Arial" font-size="13">recovery time target</text>

  <rect x="74" y="790" width="1130" height="72" rx="16" fill="#071424" stroke="#31415f"/>
  <text x="96" y="823" fill="#f3f7fb" font-family="Arial" font-size="17" font-weight="700">Interview rule:</text>
  <text x="220" y="823" fill="#d9e3f0" font-family="Arial" font-size="16">Backup is not enough. Restore testing proves the backup is operationally useful.</text>
  <text x="96" y="850" fill="#f3f7fb" font-family="Arial" font-size="17" font-weight="700">Practice:</text>
  <text x="175" y="850" fill="#d9e3f0" font-family="Arial" font-size="16">Know snapshots vs PITR, run mongodump/mongorestore, and explain RPO/RTO clearly.</text>
</svg>
