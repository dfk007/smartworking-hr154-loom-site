<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">MongoDB Performance Tuning Query Analysis and Indexing</title>
  <desc id="desc">Educational infographic comparing COLLSCAN and IXSCAN, explain executionStats, compound indexes, TTL index, and filter plus sort order.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06111f"/><stop offset="1" stop-color="#0b1020"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#20304a" stroke-width="1" opacity="0.35"/></pattern>
  </defs>
  <rect width="1280" height="900" fill="url(#bg)"/>
  <rect width="1280" height="900" fill="url(#grid)" opacity="0.55"/>
  <text x="64" y="76" fill="#f3f7fb" font-family="Arial" font-size="36" font-weight="800">MongoDB Performance, Query Analysis, and Indexing</text>
  <text x="64" y="114" fill="#8ca0bc" font-family="Arial" font-size="18">Use explain plans to prove whether MongoDB scans the whole collection or uses an efficient index path.</text>

  <rect x="54" y="150" width="560" height="560" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="86" y="195" fill="#f87171" font-family="Arial" font-size="22" font-weight="800">Before Index: COLLSCAN</text>
  <text x="86" y="225" fill="#d9e3f0" font-family="Arial" font-size="15">The query walks many documents because no useful index exists.</text>
  <g fill="#132235" stroke="#31415f">
    <rect x="100" y="280" width="70" height="42" rx="8"/><rect x="185" y="280" width="70" height="42" rx="8"/><rect x="270" y="280" width="70" height="42" rx="8"/><rect x="355" y="280" width="70" height="42" rx="8"/><rect x="440" y="280" width="70" height="42" rx="8"/>
    <rect x="100" y="345" width="70" height="42" rx="8"/><rect x="185" y="345" width="70" height="42" rx="8"/><rect x="270" y="345" width="70" height="42" rx="8"/><rect x="355" y="345" width="70" height="42" rx="8"/><rect x="440" y="345" width="70" height="42" rx="8"/>
    <rect x="100" y="410" width="70" height="42" rx="8"/><rect x="185" y="410" width="70" height="42" rx="8"/><rect x="270" y="410" width="70" height="42" rx="8"/><rect x="355" y="410" width="70" height="42" rx="8"/><rect x="440" y="410" width="70" height="42" rx="8"/>
  </g>
  <path d="M85 260 C170 250, 145 475, 225 465 C320 455, 260 255, 360 260 C475 266, 430 475, 535 465" fill="none" stroke="#f87171" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="130" y="535" fill="#fecaca" font-family="Arial" font-size="18" font-weight="700">Problem: scan cost grows with collection size</text>
  <rect x="100" y="585" width="455" height="70" rx="14" fill="#25121a" stroke="#f87171"/>
  <text x="125" y="614" fill="#f87171" font-family="Arial" font-size="16" font-weight="800">explain(executionStats)</text>
  <text x="125" y="641" fill="#d9e3f0" font-family="Arial" font-size="14">winningPlan: COLLSCAN, docsExamined: very high</text>

  <rect x="666" y="150" width="560" height="560" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="698" y="195" fill="#4ade80" font-family="Arial" font-size="22" font-weight="800">After Index: IXSCAN</text>
  <text x="698" y="225" fill="#d9e3f0" font-family="Arial" font-size="15">The query jumps through the index and examines fewer records.</text>
  <rect x="720" y="280" width="410" height="74" rx="16" fill="#08111d" stroke="#4ade80"/>
  <text x="746" y="312" fill="#bbf7d0" font-family="Arial" font-size="17" font-weight="800">Compound index</text>
  <text x="746" y="338" fill="#d9e3f0" font-family="Arial" font-size="15">tenantId + status + createdAt</text>
  <g fill="#12263a" stroke="#4ade80">
    <rect x="744" y="405" width="70" height="42" rx="8"/><rect x="829" y="405" width="70" height="42" rx="8"/><rect x="914" y="405" width="70" height="42" rx="8"/><rect x="999" y="405" width="70" height="42" rx="8"/>
  </g>
  <line x1="925" y1="355" x2="925" y2="397" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M735 490 C810 460, 960 460, 1075 490" fill="none" stroke="#4ade80" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="762" y="535" fill="#bbf7d0" font-family="Arial" font-size="18" font-weight="700">Faster path: fewer docs examined, sort already aligned</text>
  <rect x="720" y="585" width="455" height="70" rx="14" fill="#0f2418" stroke="#4ade80"/>
  <text x="745" y="614" fill="#4ade80" font-family="Arial" font-size="16" font-weight="800">explain(executionStats)</text>
  <text x="745" y="641" fill="#d9e3f0" font-family="Arial" font-size="14">winningPlan: IXSCAN, docsExamined: low</text>

  <rect x="96" y="750" width="1088" height="110" rx="18" fill="#071424" stroke="#31415f"/>
  <text x="125" y="785" fill="#f3f7fb" font-family="Arial" font-size="18" font-weight="800">Index design rule</text>
  <text x="125" y="817" fill="#d9e3f0" font-family="Arial" font-size="16">Build indexes from real query patterns: equality filters first, then range/sort fields. More indexes can slow writes and use storage.</text>
  <text x="125" y="846" fill="#fbbf24" font-family="Arial" font-size="16" font-weight="700">Also know:</text>
  <text x="228" y="846" fill="#d9e3f0" font-family="Arial" font-size="16">TTL indexes expire temporary data; Atlas Performance Advisor suggests indexes based on slow queries.</text>
</svg>
