<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">MongoDB Security Networking and Access Control</title>
  <desc id="desc">Educational infographic explaining IP allowlist, private networking, least privilege users, TLS, encryption at rest, KMS, audit logs, and avoiding 0.0.0.0/0 in production.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06111f"/><stop offset="1" stop-color="#0b1020"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#20304a" stroke-width="1" opacity="0.35"/></pattern>
  </defs>
  <rect width="1280" height="900" fill="url(#bg)"/>
  <rect width="1280" height="900" fill="url(#grid)" opacity="0.55"/>
  <text x="64" y="76" fill="#f3f7fb" font-family="Arial" font-size="36" font-weight="800">MongoDB Security, Networking, and Access Control</text>
  <text x="64" y="114" fill="#8ca0bc" font-family="Arial" font-size="18">Production Atlas security is layered: network boundary, identity, encryption, auditing, and least privilege.</text>

  <rect x="54" y="150" width="590" height="565" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="86" y="195" fill="#38bdf8" font-family="Arial" font-size="20" font-weight="700">1. Network Boundary</text>
  <rect x="112" y="300" width="420" height="260" rx="24" fill="#08111d" stroke="#4ade80" stroke-width="4"/>
  <text x="250" y="338" fill="#bbf7d0" font-family="Arial" font-size="20" font-weight="800">Atlas Project</text>
  <circle cx="322" cy="440" r="70" fill="#12263a" stroke="#4ade80" stroke-width="4"/>
  <text x="286" y="436" fill="#f3f7fb" font-family="Arial" font-size="18" font-weight="800">Cluster</text>
  <text x="270" y="462" fill="#8ca0bc" font-family="Arial" font-size="13">TLS required</text>
  <rect x="80" y="235" width="150" height="52" rx="14" fill="#0f2418" stroke="#4ade80"/>
  <text x="105" y="267" fill="#bbf7d0" font-family="Arial" font-size="15" font-weight="700">Your IP /32</text>
  <line x1="230" y1="262" x2="270" y2="390" stroke="#4ade80" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="430" y="235" width="155" height="52" rx="14" fill="#25121a" stroke="#f87171"/>
  <text x="455" y="267" fill="#fecaca" font-family="Arial" font-size="15" font-weight="700">0.0.0.0/0</text>
  <line x1="450" y1="280" x2="390" y2="385" stroke="#f87171" stroke-width="4"/>
  <line x1="430" y1="280" x2="370" y2="385" stroke="#f87171" stroke-width="4"/>
  <text x="120" y="610" fill="#fbbf24" font-family="Arial" font-size="17" font-weight="800">Lab:</text>
  <text x="164" y="610" fill="#d9e3f0" font-family="Arial" font-size="16">restricted IP allowlist</text>
  <text x="120" y="642" fill="#fbbf24" font-family="Arial" font-size="17" font-weight="800">Prod:</text>
  <text x="164" y="642" fill="#d9e3f0" font-family="Arial" font-size="16">VPC peering / PrivateLink</text>

  <rect x="690" y="150" width="536" height="565" rx="24" fill="#0e1728" stroke="#24314a"/>
  <text x="722" y="195" fill="#38bdf8" font-family="Arial" font-size="20" font-weight="700">2. Least Privilege Identities</text>
  <rect x="735" y="245" width="430" height="74" rx="16" fill="#08111d" stroke="#38bdf8"/>
  <text x="760" y="276" fill="#f3f7fb" font-family="Arial" font-size="17" font-weight="800">app_rw</text>
  <text x="855" y="276" fill="#d9e3f0" font-family="Arial" font-size="15">readWrite only on appdb</text>
  <text x="760" y="301" fill="#8ca0bc" font-family="Arial" font-size="13">runtime app user, not admin</text>
  <rect x="735" y="345" width="430" height="74" rx="16" fill="#08111d" stroke="#fbbf24"/>
  <text x="760" y="376" fill="#f3f7fb" font-family="Arial" font-size="17" font-weight="800">ops_monitor</text>
  <text x="890" y="376" fill="#d9e3f0" font-family="Arial" font-size="15">clusterMonitor on admin</text>
  <text x="760" y="401" fill="#8ca0bc" font-family="Arial" font-size="13">observability without write power</text>
  <rect x="735" y="445" width="430" height="74" rx="16" fill="#08111d" stroke="#4ade80"/>
  <text x="760" y="476" fill="#f3f7fb" font-family="Arial" font-size="17" font-weight="800">readonly_user</text>
  <text x="905" y="476" fill="#d9e3f0" font-family="Arial" font-size="15">read only on appdb</text>
  <text x="760" y="501" fill="#8ca0bc" font-family="Arial" font-size="13">failed write proves access control</text>
  <rect x="735" y="570" width="430" height="88" rx="16" fill="#071424" stroke="#31415f"/>
  <text x="760" y="602" fill="#fbbf24" font-family="Arial" font-size="16" font-weight="800">Rule:</text>
  <text x="815" y="602" fill="#d9e3f0" font-family="Arial" font-size="15">separate users for app, migrations, analytics, ops</text>
  <text x="760" y="630" fill="#d9e3f0" font-family="Arial" font-size="15">Never give broad admin access to normal workloads.</text>

  <rect x="96" y="760" width="1088" height="100" rx="18" fill="#071424" stroke="#31415f"/>
  <text x="125" y="795" fill="#f3f7fb" font-family="Arial" font-size="18" font-weight="800">Security controls to mention</text>
  <text x="125" y="827" fill="#d9e3f0" font-family="Arial" font-size="16">TLS in transit, encryption at rest, KMS for key ownership, audit logs for sensitive operations, private networking for production access.</text>
  <text x="125" y="854" fill="#f87171" font-family="Arial" font-size="16" font-weight="800">Avoid 0.0.0.0/0 in production.</text>
</svg>
